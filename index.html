<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Context-Aware Gradient Descent</title>
<style>
  body { margin: 0; background: #0f172a; color: white; font-family: Arial; }
  canvas { display: block; margin: auto; background: #020617; }
  #panel { text-align: center; padding: 10px; }
</style>
</head>
<body>

<div id="panel">
  <h2>Context-Aware Gradient Descent Navigation</h2>
  <p>Clustering → Cost Field → Gradient Flow</p>
</div>

<canvas id="canvas" width="900" height="600"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const W = canvas.width;
const H = canvas.height;

// PARAMETERS
const NUM = 150;
const EPS = 35;
const MIN = 4;
const STEP = 1.2;

// Generate obstacles
let pts = [];
for (let i = 0; i < NUM; i++) {
  pts.push({ x: Math.random() * W, y: Math.random() * H });
}

// Distance
function dist(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y);
}

// DBSCAN
function dbscan() {
  let visited = new Set();
  let clusters = [];

  for (let i = 0; i < pts.length; i++) {
    if (visited.has(i)) continue;
    visited.add(i);

    let neigh = region(i);
    if (neigh.length < MIN) continue;

    let cluster = [];
    expand(i, neigh, cluster, visited);
    clusters.push(cluster);
  }
  return clusters;
}

function region(i) {
  let res = [];
  for (let j = 0; j < pts.length; j++) {
    if (dist(pts[i], pts[j]) < EPS) res.push(j);
  }
  return res;
}

function expand(i, neigh, cluster, visited) {
  cluster.push(i);

  for (let n of neigh) {
    if (!visited.has(n)) {
      visited.add(n);
      let neigh2 = region(n);
      if (neigh2.length >= MIN) neigh = neigh.concat(neigh2);
    }
    if (!cluster.includes(n)) cluster.push(n);
  }
}

// Cluster centers
function centers(cls) {
  return cls.map(c => {
    let x = 0, y = 0;
    c.forEach(i => { x += pts[i].x; y += pts[i].y; });
    return { x: x/c.length, y: y/c.length, size: c.length };
  });
}

let clusters = dbscan();
let centersList = centers(clusters);

// Start & goal
let pos = { x: 60, y: 60 };
let goal = { x: W - 60, y: H - 60 };
let path = [];

// Gradient
function grad(p) {
  let gx = (p.x - goal.x);
  let gy = (p.y - goal.y);

  centersList.forEach(c => {
    let dx = p.x - c.x;
    let dy = p.y - c.y;
    let d = Math.hypot(dx, dy) + 0.01;

    let force = c.size * 1500 / (dd);
    gx += force * (dx/d);
    gy += force * (dy/d);
  });

  return { x: gx, y: gy };
}

// Step
function update() {
  let g = grad(pos);
  pos.x -= STEP * g.x * 0.01;
  pos.y -= STEP * g.y * 0.01;
  path.push({ ...pos });
}

// Draw
function draw() {
  ctx.clearRect(0, 0, W, H);

  // Points
  ctx.fillStyle = "#64748b";
  pts.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, 2, 0, 2Math.PI);
    ctx.fill();
  });

  // Clusters
  centersList.forEach(c => {
    ctx.fillStyle = "rgba(255,80,80,0.2)";
    ctx.beginPath();
    ctx.arc(c.x, c.y, 8 + c.size, 0, 2Math.PI);
    ctx.fill();
  });

  // Path
  ctx.strokeStyle = "#22c55e";
  ctx.beginPath();
  path.forEach((p,i) => {
    if (i === 0) ctx.moveTo(p.x, p.y);
    else ctx.lineTo(p.x, p.y);
  });
  ctx.stroke();

  // Start
  ctx.fillStyle = "#3b82f6";
  ctx.beginPath();
  ctx.arc(60, 60, 6, 0, 2Math.PI);
  ctx.fill();

  // Goal
  ctx.fillStyle = "#facc15";
  ctx.beginPath();
  ctx.arc(goal.x, goal.y, 6, 0, 2Math.PI);
  ctx.fill();

  // Robot
  ctx.fillStyle = "#22c55e";
  ctx.beginPath();
  ctx.arc(pos.x, pos.y, 5, 0, 2Math.PI);
  ctx.fill();
}

// Loop
function loop() {
  for (let i = 0; i < 3; i++) update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
